# Pre-commit hooks for pfb-model-spec
# See https://pre-commit.com for more information
#
# NOTE: When hooks modify files, pre-commit will "fail" and abort the commit.
# This is expected behavior - it allows you to review the changes.
# Simply run `git add -u && git commit` again. The second attempt will succeed
# because the files are already correctly formatted/updated.

# Install both the pre-commit (file checks) and commit-msg (conventional commits)
# hook types when `pre-commit install` is run, so commit-message enforcement is
# active by default without needing `--hook-type commit-msg`.
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.2
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: ^CHANGELOG\.md$
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-toml
      - id: mixed-line-ending

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.1.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - refactor
          - perf
          - docs
          - deps
          - chore
          - ci
          - style
          - test
          - build

  # Local hooks run after external hooks, ensuring they see formatted code
  - repo: local
    hooks:

      - id: generate-cabs
        name: Generate Stimela cab definitions
        entry: hip-cargo generate-cabs --module src/pfb_model_spec/cli/*.py --output-dir src/pfb_model_spec/cabs
        language: system
        always_run: true
        pass_filenames: false
